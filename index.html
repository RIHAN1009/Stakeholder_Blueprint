document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bb862cd7-d128-4e49-81ef-d115f0296497\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   CertAIn — Service Blueprint (Delegate)  |  Design System\n   Palette grounded in the original green/gold, desaturated\n   ~15% and pushed for contrast. Light = print default.\n   ============================================================ */\n\n:root {\n  /* surfaces */\n  --bg-app:       #E4E2D8;\n  --paper:        #F7F5ED;\n  --paper-edge:   #E9E6DA;\n  --hair:         #D2CFC1;\n  --hair-strong:  #B9B5A4;\n\n  /* ink */\n  --ink:          #1E241F;\n  --ink-soft:     #4B5249;\n  --ink-faint:    #7E8475;\n\n  /* green (primary / happy path / backstage) */\n  --green-deep:   #1C4A36;\n  --green:        #2C6A4B;\n  --green-mid:    #3B7E5C;\n  --green-bg:     #E7F0E9;\n  --green-bg-2:   #DDEBE0;\n\n  /* gold / amber (KPI, recovery, exception) */\n  --gold-deep:    #8A6E1F;\n  --gold:         #B0862F;\n  --gold-bg:      #F6EED6;\n  --amber:        #BE7C26;\n  --amber-bg:     #F8EBD6;\n\n  /* blue (frontstage / above-visibility wash) */\n  --blue:         #3A6580;\n  --blue-deep:    #2A4F66;\n  --blue-bg:      #E8F0F4;\n  --wash-above:   #F2F6F8;\n\n  /* slate (technology infrastructure cards) */\n  --slate:        #243036;\n  --slate-2:      #2D3B42;\n  --slate-ink:    #DCE4E8;\n  --slate-faint:  #93A2A9;\n\n  /* red (failure) */\n  --red:          #AE3B36;\n  --red-bg:       #F7E7E4;\n\n  /* cream (customer journey) */\n  --cream:        #FCF9F0;\n  --wash-below:   #EFEEE7;\n\n  /* type */\n  --f-head: \"Archivo\", system-ui, sans-serif;\n  --f-body: \"Hanken Grotesk\", system-ui, sans-serif;\n  --f-mono: \"IBM Plex Mono\", ui-monospace, monospace;\n\n  --sheet-w: 1587px;\n  --sheet-h: 1123px;\n}\n\n[data-theme=\"dark\"] {\n  --bg-app:       #14110D;\n  --paper:        #1B201C;\n  --paper-edge:   #232A24;\n  --hair:         #333A33;\n  --hair-strong:  #475046;\n\n  --ink:          #ECEDE4;\n  --ink-soft:     #B6BBAE;\n  --ink-faint:    #828978;\n\n  --green-deep:   #7FC79B;\n  --green:        #5FB183;\n  --green-mid:    #4E9D71;\n  --green-bg:     #1E3328;\n  --green-bg-2:   #24402F;\n\n  --gold-deep:    #E0BE6B;\n  --gold:         #D9B25A;\n  --gold-bg:      #352C16;\n  --amber:        #E0A858;\n  --amber-bg:     #3A2C16;\n\n  --blue:         #84B4D0;\n  --blue-deep:    #6FA3C2;\n  --blue-bg:      #1B2C36;\n  --wash-above:   #1B2125;\n\n  --slate:        #0E1417;\n  --slate-2:      #141C20;\n  --slate-ink:    #CAD4D9;\n  --slate-faint:  #6C7B82;\n\n  --red:          #E08079;\n  --red-bg:       #36211F;\n\n  --cream:        #20251F;\n  --wash-below:   #181C18;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  background: var(--bg-app);\n  color: var(--ink);\n  font-family: var(--f-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---------- toolbar (screen only) ---------- */\n.toolbar {\n  position: sticky; top: 0; z-index: 50;\n  display: flex; align-items: center; gap: 16px;\n  padding: 10px 22px;\n  background: color-mix(in oklab, var(--bg-app) 80%, #000 4%);\n  backdrop-filter: blur(8px);\n  border-bottom: 1px solid var(--hair-strong);\n}\n.toolbar .brand {\n  display: flex; align-items: center; gap: 10px;\n  font-family: var(--f-head); font-weight: 700; letter-spacing: .02em;\n  font-size: 14px; color: var(--ink);\n}\n.toolbar .brand .dot {\n  width: 22px; height: 22px; border-radius: 6px;\n  background: var(--green); display: grid; place-items: center;\n  color: #fff; font-size: 12px; font-weight: 800;\n}\n.toolbar .sub { font-family: var(--f-body); font-weight: 500; color: var(--ink-faint); font-size: 12px; }\n.toolbar .spacer { flex: 1; }\n.toolbar button {\n  font-family: var(--f-body); font-weight: 600; font-size: 12.5px;\n  color: var(--ink); background: var(--paper);\n  border: 1px solid var(--hair-strong); border-radius: 8px;\n  padding: 7px 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px;\n  transition: background .15s, transform .1s;\n}\n.toolbar button:hover { background: var(--paper-edge); }\n.toolbar button:active { transform: translateY(1px); }\n.toolbar button svg { width: 15px; height: 15px; }\n\n/* ---------- sheet scaling ---------- */\n#stage {\n  display: flex; flex-direction: column; align-items: center;\n  gap: 30px; padding: 30px 0 70px;\n}\n.sheet {\n  width: var(--sheet-w); min-height: var(--sheet-h);\n  background: var(--paper);\n  color: var(--ink);\n  box-shadow: 0 1px 0 var(--paper-edge), 0 24px 60px -28px rgba(0,0,0,.5);\n  position: relative;\n  padding: 28px 34px 18px;\n  border: 1px solid var(--paper-edge);\n  transform-origin: top center;\n}\n\n/* ---------- sheet header ---------- */\n.sheet-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }\n.sheet-head .title-block { max-width: 1040px; }\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--f-mono); font-size: 11px; letter-spacing: .14em;\n  text-transform: uppercase; color: var(--green); font-weight: 600;\n  margin-bottom: 6px;\n}\n.eyebrow .tag {\n  background: var(--green); color: #fff; border-radius: 4px;\n  padding: 2px 7px; letter-spacing: .08em;\n}\n[data-theme=\"dark\"] .eyebrow .tag { color: #0E1417; }\nh1.sheet-title {\n  font-family: var(--f-head); font-weight: 800; letter-spacing: -0.01em;\n  font-size: 30px; line-height: 1.04; margin: 0 0 7px;\n  color: var(--ink);\n}\n.sheet-title em { font-style: normal; color: var(--green); }\n.sheet-sub { font-size: 12.5px; line-height: 1.45; color: var(--ink-soft); margin: 0; max-width: 980px; }\n.persona-chip {\n  flex: 0 0 auto; text-align: right;\n  display: flex; flex-direction: column; gap: 3px;\n  padding: 10px 16px; border-left: 2px solid var(--gold);\n}\n.persona-chip .label { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); }\n.persona-chip .name { font-family: var(--f-head); font-weight: 700; font-size: 16px; color: var(--ink); }\n.persona-chip .role { font-size: 11px; color: var(--ink-soft); }\n\n/* persona chip with photo variant */\n.persona-chip--photo {\n  flex-direction: row; align-items: center; gap: 12px;\n  padding: 8px 16px; text-align: left;\n}\n.persona-avatar {\n  width: 56px; height: 56px; border-radius: 50%;\n  border: 2px solid var(--gold);\n  object-fit: cover; flex: 0 0 auto;\n}\n.persona-text { display: flex; flex-direction: column; gap: 2px; }\n\n.sheet-rule { height: 2px; background: var(--ink); margin: 14px 0 12px; opacity: .85; }\n[data-theme=\"dark\"] .sheet-rule { background: var(--ink-soft); }\n\n/* ============================================================\n   BLUEPRINT GRID\n   ============================================================ */\n:root { --label-w: 150px; --col-gap: 7px; }\n\n.lane {\n  display: grid;\n  grid-template-columns: var(--label-w) repeat(6, 1fr);\n  gap: var(--col-gap);\n  align-items: stretch;\n}\n.lane + .lane { margin-top: var(--col-gap); }\n\n/* lane label cell */\n.lane-label {\n  display: flex; flex-direction: column; justify-content: center; gap: 2px;\n  padding: 4px 10px 4px 0;\n}\n.lane-label .ll-title {\n  font-family: var(--f-head); font-weight: 700; font-size: 11px;\n  letter-spacing: .04em; text-transform: uppercase; color: var(--ink);\n  line-height: 1.1;\n}\n.lane-label .ll-sub { font-size: 9.5px; color: var(--ink-faint); line-height: 1.2; font-style: italic; }\n.lane-label .ll-icon { display:inline-flex; }\n.lane-label .ll-row { display:flex; align-items:center; gap:6px; }\n.lane-label svg { width: 14px; height: 14px; }\n\n/* generic cell */\n.cell {\n  border-radius: 7px;\n  padding: 8px 10px;\n  font-size: 10.7px; line-height: 1.32; color: var(--ink-soft);\n  border: 1px solid var(--hair);\n  background: var(--paper);\n  position: relative;\n}\n\n/* ---- stage header banner ---- */\n.lane--header .lane-label .ll-title { color: var(--ink-faint); font-size: 10px; }\n.stage-banner {\n  display: flex; align-items: center; gap: 9px;\n  background: var(--green-deep); color: #fff;\n  border: none; border-radius: 8px; padding: 9px 12px;\n  position: relative;\n}\n[data-theme=\"dark\"] .stage-banner { background: var(--green-bg-2); color: var(--ink); border: 1px solid var(--green); }\n.stage-banner .num {\n  font-family: var(--f-head); font-weight: 800; font-size: 17px;\n  width: 26px; height: 26px; border-radius: 6px;\n  background: rgba(255,255,255,.16); display: grid; place-items: center;\n  flex: 0 0 auto;\n}\n[data-theme=\"dark\"] .stage-banner .num { background: var(--green); color: #0E1417; }\n.stage-banner .sb-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }\n.stage-banner .sb-name { font-family: var(--f-head); font-weight: 700; font-size: 12.5px; line-height: 1.08; }\n.stage-banner .sb-time {\n  font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .02em;\n  color: rgba(255,255,255,.82);\n}\n[data-theme=\"dark\"] .stage-banner .sb-time { color: var(--green-deep); }\n/* inter-stage solid green arrow */\n.stage-banner.flow::after {\n  content: \"\"; position: absolute; right: calc(-1 * var(--col-gap) - 1px); top: 50%;\n  width: calc(var(--col-gap) + 9px); height: 0;\n  transform: translateY(-50%);\n  border-top: 2px solid var(--green);\n  z-index: 4;\n}\n.stage-banner.flow::before {\n  content: \"\"; position: absolute; right: calc(-1 * var(--col-gap) - 2px); top: 50%;\n  transform: translateY(-50%);\n  border-left: 6px solid var(--green);\n  border-top: 4px solid transparent; border-bottom: 4px solid transparent;\n  z-index: 5;\n}\n\n/* ---- physical evidence ---- */\n.cell--evidence {\n  background: transparent; border: 1px dashed var(--hair-strong);\n  color: var(--ink-soft); font-size: 10.2px; font-style: italic;\n}\n\n/* ---- customer journey ---- */\n.cell--journey {\n  background: var(--cream);\n  border: 1px solid var(--hair);\n  border-left: 3px solid var(--gold);\n  display: flex; flex-direction: column; gap: 5px;\n  color: var(--ink);\n  font-size: 10.9px;\n}\n.trace-badge {\n  align-self: stretch;\n  display: block;\n  font-family: var(--f-mono); font-size: 8.3px; font-weight: 500;\n  line-height: 1.4; letter-spacing: .01em;\n  color: var(--green-deep); background: var(--green-bg);\n  border: 1px solid color-mix(in oklab, var(--green) 35%, transparent);\n  border-radius: 7px; padding: 3px 8px;\n}\n[data-theme=\"dark\"] .trace-badge { color: var(--green-deep); background: var(--green-bg); }\n.trace-badge svg { width: 9px; height: 9px; display: inline; vertical-align: -1px; margin-right: 3px; }\n.trace-badge .b-ins { font-weight: 600; color: var(--green); }\n.trace-badge .b-sep { opacity: .4; margin: 0 4px; }\n\n/* ---- frontstage ---- */\n.cell--front { background: var(--blue-bg); border: 1px solid color-mix(in oklab, var(--blue) 24%, transparent); color: var(--ink); }\n.cell--front .role-tag, .cell--back .role-tag {\n  display: inline-flex; align-items: center; gap: 5px;\n  font-family: var(--f-head); font-weight: 700; font-size: 8.5px;\n  letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px;\n}\n.cell--front .role-tag { color: var(--blue-deep); }\n.cell--front .role-tag svg { width: 12px; height: 12px; }\n\n/* ---- technology (dark infra cards) ---- */\n.cell--tech {\n  background: var(--slate); color: var(--slate-ink);\n  border: 1px solid var(--slate-2);\n}\n.cell--tech .tech-icons { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }\n.cell--tech .ti {\n  display: inline-flex; align-items: center; gap: 4px;\n  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);\n  border-radius: 5px; padding: 2px 6px;\n  font-size: 8px; font-family: var(--f-mono); letter-spacing: .02em; color: var(--slate-faint);\n}\n[data-theme=\"dark\"] .cell--tech .ti { background: rgba(255,255,255,.05); }\n.cell--tech .ti svg { width: 11px; height: 11px; color: var(--green-mid); }\n[data-theme=\"dark\"] .cell--tech .ti svg { color: var(--green); }\n.cell--tech .tech-body { color: var(--slate-ink); font-size: 10.3px; }\n.cell--tech .nfc-note {\n  margin-top: 6px; padding-top: 6px; border-top: 1px dotted rgba(255,255,255,.18);\n  font-size: 8.6px; font-style: italic; color: var(--slate-faint); line-height: 1.3;\n}\n\n/* ---- backstage ---- */\n.cell--back { background: var(--green-bg); border: 1px solid color-mix(in oklab, var(--green) 26%, transparent); color: var(--ink); }\n.cell--back .role-tag { color: var(--green-deep); }\n.cell--back .role-tag svg { width: 12px; height: 12px; }\n\n/* ---- support processes ---- */\n.cell--support {\n  background: transparent; border: 1px solid var(--hair-strong);\n  border-top: 2px solid var(--ink-faint);\n  font-size: 10px; color: var(--ink-soft);\n}\n\n/* ---- failure ---- */\n.cell--fail {\n  background: var(--red-bg); border: 1px solid color-mix(in oklab, var(--red) 30%, transparent);\n  border-left: 3px solid var(--red); color: var(--ink);\n  display: flex; gap: 7px; align-items: flex-start; font-size: 10.2px;\n}\n.cell--fail svg { width: 13px; height: 13px; color: var(--red); flex: 0 0 auto; margin-top: 1px; }\n\n/* ---- recovery ---- */\n.cell--recover {\n  background: var(--amber-bg); border: 1px solid color-mix(in oklab, var(--amber) 32%, transparent);\n  border-left: 3px solid var(--amber); color: var(--ink);\n  display: flex; gap: 7px; align-items: flex-start; font-size: 10.2px;\n}\n.cell--recover svg.rec-ic { width: 13px; height: 13px; color: var(--amber); flex: 0 0 auto; margin-top: 1px; }\n.cell--recover.has-loop { box-shadow: 0 0 0 2px color-mix(in oklab, var(--amber) 45%, transparent); }\n.loop-tag {\n  position: absolute; top: -8px; right: 8px;\n  font-family: var(--f-mono); font-size: 7.6px; letter-spacing: .04em; text-transform: uppercase;\n  background: var(--amber); color: #fff; border-radius: 10px; padding: 1px 7px;\n  display: inline-flex; align-items: center; gap: 4px;\n}\n[data-theme=\"dark\"] .loop-tag { color: #14110D; }\n.loop-tag svg { width: 8px; height: 8px; }\n\n/* ---- KPI ---- */\n.lane--kpi .cell { background: var(--gold-bg); border: 1px solid color-mix(in oklab, var(--gold) 36%, transparent); }\n.kpi-main { font-family: var(--f-head); font-weight: 700; font-size: 11px; color: var(--gold-deep); line-height: 1.18; }\n.kpi-delta {\n  margin-top: 4px; display: inline-flex; align-items: center; gap: 5px;\n  font-family: var(--f-mono); font-size: 8.7px; color: var(--ink-soft);\n  background: color-mix(in oklab, var(--gold) 16%, transparent);\n  border-radius: 4px; padding: 2px 6px;\n}\n.kpi-delta .arrow { font-weight: 800; color: var(--green); font-size: 11px; line-height: 1; }\n.kpi-delta .arrow.down { color: var(--green); }\n.kpi-lane-label .ll-title { color: var(--gold-deep); }\n\n/* ============================================================\n   LINES OF SEPARATION\n   ============================================================ */\n.bp-line {\n  display: grid;\n  grid-template-columns: var(--label-w) repeat(6, 1fr);\n  gap: var(--col-gap);\n  align-items: center;\n  margin: 9px 0;\n}\n.bp-line .line-label {\n  display: flex; flex-direction: column; gap: 1px; padding-right: 8px;\n}\n.bp-line .line-label .ll-name {\n  font-family: var(--f-head); font-weight: 800; font-size: 9.5px;\n  letter-spacing: .08em; text-transform: uppercase; line-height: 1.05;\n}\n.bp-line .line-label .ll-desc { font-size: 8.4px; color: var(--ink-faint); line-height: 1.2; font-style: italic; }\n\n.bp-line .rule-cell { position: relative; height: 14px; display: grid; place-items: center; }\n.bp-line .rule-cell .rule { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); }\n\n/* interaction line — solid 3px green, with dashed bidirectional markers per stage */\n.line--interaction { margin: 7px 0; }\n.line--interaction .line-label .ll-name { color: var(--blue-deep); }\n.line--interaction .rule { border-top: 1.5px dashed var(--blue); }\n.line--interaction .bi-arrow {\n  position: relative; z-index: 2; color: var(--blue);\n  font-size: 12px; line-height: 1; background: var(--paper); padding: 0 3px;\n}\n\n/* visibility line — the major divider, 3px solid, downward info-flow arrows */\n.line--visibility { margin: 8px 0; }\n.line--visibility .line-label .ll-name { color: var(--ink); }\n.line--visibility .rule { border-top: 3px solid var(--ink); }\n[data-theme=\"dark\"] .line--visibility .rule { border-top-color: var(--ink-soft); }\n.line--visibility .info-flow {\n  position: relative; z-index: 2; color: var(--green); background: var(--paper);\n  padding: 0 4px; display: inline-flex; flex-direction: column; align-items: center; line-height: .7;\n}\n.line--visibility .info-flow svg { width: 13px; height: 16px; }\n\n/* internal interaction line — 2px dotted */\n.line--internal { margin: 7px 0; }\n.line--internal .line-label .ll-name { color: var(--green-deep); }\n.line--internal .rule { border-top: 2px dotted var(--green); }\n\n/* zone washes */\n.zone { border-radius: 9px; padding: 9px; margin: 0 -9px; }\n.zone--above { background: var(--wash-above); }\n.zone--below { background: var(--wash-below); }\n.zone--resilience {\n  background: color-mix(in oklab, var(--amber) 7%, transparent);\n  border: 1px dashed color-mix(in oklab, var(--amber) 30%, transparent);\n}\n.zone-tag {\n  display: flex; align-items: center; gap: 8px; margin: 1px 2px 8px;\n  font-family: var(--f-mono); font-size: 8.6px; letter-spacing: .12em; text-transform: uppercase;\n  color: var(--ink-faint);\n}\n.zone-tag::after { content: \"\"; flex: 1; height: 1px; background: var(--hair); }\n.zone-tag .star { color: var(--amber); font-style: normal; }\n\n/* ============================================================\n   LEGEND STRIP (page 1 footer)\n   ============================================================ */\n.legend {\n  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;\n  margin-top: 10px; padding-top: 9px; border-top: 1px solid var(--hair);\n}\n.legend .leg-col h4 {\n  font-family: var(--f-head); font-weight: 800; font-size: 9px; letter-spacing: .1em;\n  text-transform: uppercase; color: var(--ink); margin: 0 0 7px;\n}\n.legend .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 9.6px; color: var(--ink-soft); }\n.legend .leg-item:last-child { margin-bottom: 0; }\n.legend .swatch { width: 18px; height: 12px; border-radius: 3px; flex: 0 0 auto; }\n.legend .arrow-key { width: 26px; flex: 0 0 auto; display: inline-flex; align-items: center; }\n.legend .arrow-key svg { width: 26px; height: 10px; }\n.legend .leg-item svg.icn { width: 14px; height: 14px; color: var(--green); flex: 0 0 auto; }\n.legend .leg-item .mini-badge {\n  font-family: var(--f-mono); font-size: 7.6px; background: var(--green-bg);\n  border: 1px solid color-mix(in oklab, var(--green) 35%, transparent);\n  color: var(--green-deep); border-radius: 10px; padding: 1px 6px; display: inline-flex; align-items:center; gap:3px;\n}\n.legend .mini-badge svg { width: 8px; height: 8px; }\n\n.sheet-foot {\n  display: flex; justify-content: space-between; align-items: center;\n  margin-top: 10px; font-family: var(--f-mono); font-size: 9px; letter-spacing: .04em;\n  color: var(--ink-faint); border-top: 1px solid var(--hair); padding-top: 6px;\n}\n\n/* ============================================================\n   PAGE 2\n   ============================================================ */\n.p2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 4px; }\n.panel {\n  background: var(--paper); border: 1px solid var(--hair); border-radius: 10px;\n  padding: 16px 18px;\n}\n.panel h3 {\n  font-family: var(--f-head); font-weight: 800; font-size: 14px; margin: 0 0 3px;\n  color: var(--ink); letter-spacing: -0.01em;\n}\n.panel .panel-kicker {\n  font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase;\n  color: var(--green); margin: 0 0 12px;\n}\n\n/* emotional journey */\n.emo-panel { grid-column: 1 / -1; }\n.emo-wrap { position: relative; width: 100%; overflow: visible; }\n.emo-wrap svg { display: block; width: 100%; height: auto; overflow: visible; }\n\n/* key takeaway */\n.takeaway { grid-column: 1 / -1; display: flex; gap: 22px; align-items: stretch;\n  background: var(--green-deep); color: #fff; border-radius: 12px; padding: 20px 24px; }\n[data-theme=\"dark\"] .takeaway { background: var(--green-bg-2); color: var(--ink); border: 1px solid var(--green); }\n.takeaway .big {\n  flex: 0 0 auto; display: flex; flex-direction: column; justify-content: center;\n  padding-right: 22px; border-right: 1px solid rgba(255,255,255,.22);\n}\n[data-theme=\"dark\"] .takeaway .big { border-right-color: var(--hair-strong); }\n.takeaway .big .from { font-family: var(--f-mono); font-size: 11px; color: rgba(255,255,255,.7); text-decoration: line-through; }\n[data-theme=\"dark\"] .takeaway .big .from { color: var(--ink-faint); }\n.takeaway .big .to { font-family: var(--f-head); font-weight: 800; font-size: 40px; line-height: 1; margin: 4px 0; }\n.takeaway .big .to span { color: var(--gold); }\n[data-theme=\"dark\"] .takeaway .big .to span { color: var(--gold); }\n.takeaway .big .cap { font-size: 10px; color: rgba(255,255,255,.78); letter-spacing: .03em; }\n[data-theme=\"dark\"] .takeaway .big .cap { color: var(--ink-soft); }\n.takeaway .ta-body { font-size: 13px; line-height: 1.55; align-self: center; }\n.takeaway .ta-body strong { color: var(--gold); font-weight: 700; }\n.takeaway .ta-head { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.7); margin-bottom: 6px; }\n[data-theme=\"dark\"] .takeaway .ta-head { color: var(--ink-faint); }\n\n/* traceability table */\n.trace-table { width: 100%; border-collapse: collapse; font-size: 10.6px; }\n.trace-table th {\n  text-align: left; font-family: var(--f-head); font-weight: 700; font-size: 8.8px;\n  letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint);\n  padding: 0 8px 7px; border-bottom: 1.5px solid var(--hair-strong);\n}\n.trace-table td { padding: 8px; vertical-align: top; border-bottom: 1px solid var(--hair); color: var(--ink-soft); line-height: 1.32; }\n.trace-table tr:last-child td { border-bottom: none; }\n.trace-table .stg { font-family: var(--f-head); font-weight: 700; color: var(--ink); white-space: nowrap; }\n.trace-table .stg .n { color: var(--green); }\n.trace-table .ins { color: var(--ink); }\n.trace-table .ins .pill {\n  display: inline-block; font-family: var(--f-mono); font-size: 8.4px; background: var(--blue-bg);\n  border: 1px solid color-mix(in oklab, var(--blue) 26%, transparent); color: var(--blue-deep);\n  border-radius: 4px; padding: 1px 5px; margin: 0 3px 3px 0;\n}\n.trace-table .hmw .pill {\n  display: inline-block; font-family: var(--f-mono); font-size: 8.4px; background: var(--green-bg);\n  border: 1px solid color-mix(in oklab, var(--green) 30%, transparent); color: var(--green-deep);\n  border-radius: 4px; padding: 1px 5px; margin: 0 3px 3px 0;\n}\n.trace-table .res { font-size: 10px; }\n.trace-table tr.hl td { background: color-mix(in oklab, var(--gold) 12%, transparent); }\n.trace-table tr.hl .keepnote {\n  display:block; margin-top:3px; font-family: var(--f-mono); font-size: 8px; color: var(--gold-deep);\n}\n\n/* rationale cards */\n.rationale-list { display: flex; flex-direction: column; gap: 12px; }\n.rat {\n  display: flex; gap: 12px; padding: 12px; border: 1px solid var(--hair);\n  border-left: 3px solid var(--green); border-radius: 8px; background: var(--green-bg);\n}\n.rat .rn {\n  flex: 0 0 auto; width: 24px; height: 24px; border-radius: 6px; background: var(--green);\n  color: #fff; font-family: var(--f-head); font-weight: 800; font-size: 13px; display: grid; place-items: center;\n}\n[data-theme=\"dark\"] .rat .rn { color: #0E1417; }\n.rat .rt h4 { font-family: var(--f-head); font-weight: 700; font-size: 11.5px; margin: 1px 0 3px; color: var(--ink); }\n.rat .rt p { margin: 0; font-size: 10.5px; line-height: 1.4; color: var(--ink-soft); }\n\n/* rubric checklist */\n.rubric-list { display: flex; flex-direction: column; gap: 8px; }\n.rub {\n  display: flex; gap: 10px; align-items: flex-start; padding: 9px 11px;\n  border: 1px solid var(--hair); border-radius: 8px; background: var(--paper);\n}\n.rub .check {\n  flex: 0 0 auto; width: 18px; height: 18px; border-radius: 50%; background: var(--green);\n  display: grid; place-items: center; margin-top: 1px;\n}\n.rub .check svg { width: 11px; height: 11px; color: #fff; }\n[data-theme=\"dark\"] .rub .check svg { color: #0E1417; }\n.rub .rub-t { font-size: 10.5px; line-height: 1.35; color: var(--ink-soft); }\n.rub .rub-t b { color: var(--ink); font-family: var(--f-head); font-weight: 700; font-size: 11px; }\n\n.full { grid-column: 1 / -1; }\n\n/* ============================================================\n   TWEAK STATES (driven by data-* on <html>)\n   ============================================================ */\n[data-badges=\"hidden\"] .trace-badge { display: none; }\n[data-badges=\"compact\"] .trace-badge .b-hmw,\n[data-badges=\"compact\"] .trace-badge .b-sep { display: none; }\n[data-tech=\"off\"] .cell--tech .tech-icons { display: none; }\n[data-tints=\"off\"] .zone--above,\n[data-tints=\"off\"] .zone--below { background: transparent; }\n[data-arcfill=\"off\"] .emo-area { display: none; }\n[data-density=\"compact\"] .cell { padding: 6px 8px; font-size: 10px; }\n[data-density=\"compact\"] .cell--journey { font-size: 10px; }\n[data-density=\"compact\"] .lane + .lane { margin-top: 5px; }\n[data-density=\"compact\"] .cell--tech .tech-body { font-size: 9.6px; }\n\n/* ---------- Tweaks panel ---------- */\n#tweaks-panel {\n  position: fixed; top: 62px; right: 18px; z-index: 200; width: 274px;\n  background: var(--paper); border: 1px solid var(--hair-strong); border-radius: 13px;\n  box-shadow: 0 22px 54px -22px rgba(0,0,0,.55); padding: 15px 16px 17px;\n  display: none; font-family: var(--f-body);\n}\n#tweaks-panel.open { display: block; }\n.tw-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }\n.tw-head h3 { font-family: var(--f-head); font-weight: 800; font-size: 14px; margin: 0; color: var(--ink); letter-spacing: -0.01em; }\n.tw-close { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 19px; line-height: 1; padding: 1px 5px; border-radius: 6px; }\n.tw-close:hover { background: var(--paper-edge); color: var(--ink); }\n.tw-row { margin-bottom: 13px; }\n.tw-row:last-child { margin-bottom: 0; }\n.tw-row > label { display: block; font-family: var(--f-head); font-weight: 700; font-size: 9.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }\n.seg { display: flex; gap: 4px; background: var(--paper-edge); border: 1px solid var(--hair); border-radius: 9px; padding: 3px; }\n.seg button { flex: 1; font-family: var(--f-body); font-weight: 600; font-size: 11px; color: var(--ink-soft); background: none; border: none; border-radius: 6px; padding: 6px 4px; cursor: pointer; transition: background .12s, color .12s; }\n.seg button:hover { color: var(--ink); }\n.seg button.on { background: var(--green); color: #fff; }\n[data-theme=\"dark\"] .seg button.on { color: #0E1417; }\n.tw-foot { margin-top: 14px; padding-top: 11px; border-top: 1px solid var(--hair); font-size: 10px; color: var(--ink-faint); line-height: 1.4; }\n\n/* ============================================================\n   PRINT — A3 landscape, one sheet per page\n   ============================================================ */\n@media print {\n  @page { size: A3 landscape; margin: 0; }\n  html, body { background: #fff; }\n  .toolbar { display: none !important; }\n  #tweaks-panel { display: none !important; }\n  #stage { gap: 0; padding: 0; }\n  .sheet {\n    transform: none !important;\n    box-shadow: none; border: none;\n    width: var(--sheet-w); min-height: var(--sheet-h);\n    page-break-after: always; break-after: page;\n    margin: 0;\n  }\n  .sheet:last-child { page-break-after: auto; break-after: auto; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"toolbar\">\n    <div class=\"brand\"><img id=\"brand-logo\" alt=\"CertAIn\" style=\"width:24px;height:24px;object-fit:contain;border-radius:4px;vertical-align:middle;margin-right:6px\"> CertAIn <span class=\"sub\">Service Blueprint · Persona 1 · Stakeholder / Admin<\u002Fspan><\u002Fdiv>\n    <div class=\"spacer\"><\u002Fdiv>\n    <button id=\"themeBtn\" type=\"button\">Dark<\u002Fbutton>\n    <button id=\"printBtn\" type=\"button\" title=\"Save as A3 landscape PDF\">Print / PDF<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div id=\"stage\"><\u002Fdiv>\n\n  <script>\n    window.TWEAK_DEFAULTS = { badges: \"full\", techIcons: true, zoneTints: true, density: \"cozy\", arcFill: true };\n  <\u002Fscript>\n  <script src=\"26cd9c20-4efb-4926-8879-2ff8f317c637\"><\u002Fscript>\n  <script src=\"795831bd-f69e-44ed-a04f-3709c2cdad4b\"><\u002Fscript>\n  <script src=\"537d4040-0010-413e-98f0-589325efbf7c\"><\u002Fscript>\n  <script src=\"bc1086cf-53d8-4ca4-a6e8-b5b0dc2af577\"><\u002Fscript>\n  <script src=\"5349976b-2db0-4a1d-9642-c49b10b826c0\"><\u002Fscript>\n\n  \n\n\n<\u002Fbody><\u002Fhtml>"
